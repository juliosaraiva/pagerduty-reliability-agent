name: Weekly Digest

on:
  schedule:
    - cron: "0 8 * * 1"  # Monday 08:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate and send digest
        run: reliability-digest generate --send-email
        env:
          PAGERDUTY_API_KEY: ${{ secrets.PAGERDUTY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_MODEL: ${{ vars.COPILOT_MODEL || 'claude-sonnet-4-6' }}
          REPORT_TIMEZONE: ${{ vars.REPORT_TIMEZONE || 'UTC' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_FROM_ADDRESS: ${{ secrets.REPORT_FROM_ADDRESS }}
          REPORT_TO_ADDRESSES: ${{ secrets.REPORT_TO_ADDRESSES }}
