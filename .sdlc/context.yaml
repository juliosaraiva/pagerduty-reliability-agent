project:
  name: "pagerduty-reliability-agent"
  description: "Weekly reliability digest generator from PagerDuty data with AI-powered insights"
  audience: "SREs and Engineering Leadership"

spec_backend:
  type: "markdown"
  sync_status: true
  config: {}

languages:
  primary: "Python"
  all:
    - "Python"

frameworks:
  - "Click"
  - "Pydantic"
  - "httpx"
  - "Jinja2"
  - "structlog"
  - "tenacity"
  - "github-copilot-sdk"

tooling:
  test_runner: "pytest"
  linter:
    - "ruff"
    - "mypy"
  formatter:
    - "ruff"
  sast: null

ci:
  systems:
    - "GitHub Actions"
  workflow_files:
    - ".github/workflows/ci.yml"
    - ".github/workflows/weekly-digest.yml"
    - ".github/workflows/release.yml"

structure:
  source_dir: "reliability_agent/"
  test_dir: "tests/"
  config_dir: null
  docs_dir: null
  scripts_dir: null
  infra_dir: null

architecture:
  deployment_model: "CLI tool + scheduled GitHub Actions job (Monday 08:00 UTC) + Docker container"
  notes: >
    Runs as a Click CLI (reliability-digest generate / validate).
    Deployed via GitHub Actions on a weekly schedule; can also be run manually or via Docker Compose.
    Generates HTML reports delivered via SMTP email.
    AI narrative sections generated by Claude via GitHub Copilot SDK (requires copilot auth login or GITHUB_TOKEN).
    No persistent server or database — fully stateless, ephemeral runs.
  external_services:
    - name: "PagerDuty"
      type: "api"
      notes: "REST v2 + Analytics API. Auth via token. Rate limit 960 req/min."
    - name: "GitHub Copilot API"
      type: "api"
      notes: "Claude model accessed via github-copilot-sdk. Auth via GITHUB_TOKEN or copilot auth login."
    - name: "SMTP server"
      type: "other"
      notes: "Optional. Used to email the HTML report. Configured via SMTP_HOST/PORT/USER/PASSWORD."

standards:
  coding_standards_ref: null
  notes: >
    ruff enforces E, F, I, W rules with line-length 100.
    mypy enforces strict typing (disallow_untyped_defs, warn_return_any).
    Python 3.10+ type hints required throughout.
    No external style guide explicitly adopted.
